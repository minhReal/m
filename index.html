<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Me</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      background: #222;
      border: 1px solid #333;
      border-radius: 5px;
      padding: 9px 11px;
      font-size: 14px;
      font-family: sans-serif;
      color: #eee;
      outline: none;
      margin-bottom: 14px;
      resize: none;
    }

    input:focus, textarea:focus { border-color: #666; }

    textarea { min-height: 100px; }

    button {
      width: 100%;
      padding: 10px;
      background: #eee;
      color: #111;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled { background: #444; color: #888; cursor: not-allowed; }

    .status {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .status.ok  { color: #6c6; }
    .status.err { color: #e66; }
  </style>
</head>
<body>
<div class="box">
  <h1>Message me</h1>

  <label>Your name</label>
  <input id="name" type="text" placeholder="Name or anonymous" maxlength="50"/>

  <label>Message</label>
  <textarea id="msg" placeholder="Type something…" maxlength="1800"></textarea>

  <button id="btn" onclick="send()">Send</button>
  <div class="status" id="status"></div>
</div>

<script>
  const WEBHOOK = "https://discord.com/api/webhooks/1492908921877172286/Z460q7T_1L-di_rZyCiCOApxLHzAy6HAQT9oNVOz3xLb7EONmaNSsuhOwwF2nyaapCqa";
  const PING_ID = "1088769330562478160";
  const CD = 30;

  const btn    = document.getElementById('btn');
  const status = document.getElementById('status');

  // On load, check if cooldown is still active
  window.addEventListener('load', () => {
    const savedEnd = localStorage.getItem('cd_end');
    if (savedEnd) {
      const remaining = Math.ceil((parseInt(savedEnd) - Date.now()) / 1000);
      if (remaining > 0) {
        btn.disabled = true;
        runCooldown(remaining);
      } else {
        localStorage.removeItem('cd_end');
      }
    }
  });

  async function send() {
    const name = document.getElementById('name').value.trim() || 'Anonymous';
    const msg  = document.getElementById('msg').value.trim();
    if (!msg) { setStatus('Please enter a message.', 'err'); return; }

    btn.disabled = true;
    setStatus('Sending…');

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `<@${PING_ID}>\n**From:** ${name}\n**Message:** ${msg}`
        })
      });

      if (res.ok) {
        document.getElementById('msg').value = '';
        setStatus('Sent!', 'ok');
        const endTime = Date.now() + CD * 1000;
        localStorage.setItem('cd_end', endTime);
        runCooldown(CD);
      } else {
        throw new Error();
      }
    } catch {
      setStatus('Failed to send. Try again.', 'err');
      btn.disabled = false;
    }
  }

  function runCooldown(seconds) {
    let t = seconds;
    setStatus(`Wait ${t}s before sending again…`);
    const tick = setInterval(() => {
      t--;
      if (t <= 0) {
        clearInterval(tick);
        localStorage.removeItem('cd_end');
        btn.disabled = false;
        setStatus('');
      } else {
        setStatus(`Wait ${t}s before sending again…`);
      }
    }, 1000);
  }

  function setStatus(msg, cls = '') {
    status.textContent = msg;
    status.className = 'status' + (cls ? ' ' + cls : '');
  }
</script>
</body>
</html>
