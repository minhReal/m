<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TWD → VND | Tỷ giá Đài Loan</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #111827; --border: #1e2d40;
      --line: #00c9a7; --avg: #f59e0b;
      --up: #34d399; --down: #f87171;
      --text: #e2e8f0; --muted: #64748b; --accent: #00c9a7;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header { padding: 24px 32px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
    .pair-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .rate-now { font-family: 'IBM Plex Mono', monospace; font-size: clamp(32px, 5vw, 56px); font-weight: 600; line-height: 1; }
    .rate-unit { color: var(--accent); font-size: .5em; margin-left: 6px; }
    .delta-badge { display: inline-flex; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
    .up   { background: rgba(52,211,153,.15); color: var(--up); }
    .down { background: rgba(248,113,113,.15); color: var(--down); }
    .flat { background: rgba(100,116,139,.15); color: var(--muted); }
    .header-meta { margin-left: auto; text-align: right; }
    .header-meta p { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .header-meta strong { color: var(--text); font-size: 13px; }

    .stats-row { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .stat-cell { flex: 1; min-width: 100px; background: var(--surface); padding: 12px 18px; }
    .stat-cell .lbl { font-size: 10px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 4px; }
    .stat-cell .val { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; }

    main { flex: 1; padding: 24px 32px; }
    .controls { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .range-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all .15s; }
    .range-btn:hover, .range-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,201,167,.08); }

    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 16px 14px; position: relative; }
    .chart-container { position: relative; height: 320px; }

    #status { text-align: center; padding: 60px 0; font-size: 13px; color: var(--muted); }
    .status-hidden { display: none; }

    .info-bar { margin-top: 10px; font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .info-bar span { display: flex; align-items: center; gap: 5px; }
    .dot-green { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
    .dot-amber { width: 20px; height: 2px; background: var(--avg); border-radius: 1px; display: inline-block; }

    footer { padding: 14px 32px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    footer a { color: var(--accent); text-decoration: none; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e2d40; border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 10px 16px; border-radius: 6px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 14px; padding-right: 14px; }
      .header-meta { margin-left: 0; text-align: left; width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="pair-label">TWD / VND &nbsp;·&nbsp; Đài Loan Tân Đài Tệ → Việt Nam Đồng</div>
    <div>
      <span class="rate-now" id="rateNow">—<span class="rate-unit">VND</span></span>
      <span class="delta-badge flat" id="deltaBadge">—</span>
    </div>
  </div>
  <div class="header-meta">
    <p>Cập nhật lúc</p>
    <strong id="updateTime">—</strong>
  </div>
</header>

<div class="stats-row">
  <div class="stat-cell"><div class="lbl">Cao nhất (kỳ)</div><div class="val" id="sHigh">—</div></div>
  <div class="stat-cell"><div class="lbl">Thấp nhất (kỳ)</div><div class="val" id="sLow">—</div></div>
  <div class="stat-cell"><div class="lbl">Trung bình</div><div class="val" id="sAvg">—</div></div>
  <div class="stat-cell"><div class="lbl">Thay đổi (%)</div><div class="val" id="sChange">—</div></div>
  <div class="stat-cell"><div class="lbl">1.000 TWD =</div><div class="val" id="s1k">—</div></div>
</div>

<main>
  <div class="controls">
    <span style="font-size:11px;color:var(--muted)">Kỳ:</span>
    <button class="range-btn" data-days="7">7N</button>
    <button class="range-btn active" data-days="30">1T</button>
    <button class="range-btn" data-days="90">3T</button>
    <button class="range-btn" data-days="180">6T</button>
  </div>

  <div class="chart-wrap">
    <div id="status">⏳ Đang tải dữ liệu...</div>
    <div class="chart-container status-hidden" id="chartContainer">
      <canvas id="rateChart"></canvas>
    </div>
    <div class="info-bar">
      <span><i class="dot-green"></i> Tỷ giá TWD/VND</span>
      <span><i class="dot-amber"></i> Trung bình kỳ</span>
      <span id="dataInfo" style="margin-left:auto"></span>
    </div>
  </div>
</main>

<footer>
  <span>Nguồn: <a href="https://open.er-api.com" target="_blank">Open ExchangeRate API</a> · Lịch sử lưu tại trình duyệt · Tự cập nhật mỗi 1 giờ</span>
  <span id="footerRate"></span>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── UTILS ───────────────────────────────────────────
const fmt   = n => n ? Math.round(n).toLocaleString('vi-VN') : '—';
const today = () => new Date().toISOString().slice(0, 10);
const STORE_KEY = 'twd_vnd_history_v2';

function showToast(msg, ms = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── STORAGE: lưu lịch sử tỷ giá vào localStorage ───
function loadHistory() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveHistory(history) {
  try {
    // Giữ tối đa 400 ngày
    const keys = Object.keys(history).sort();
    if (keys.length > 400) {
      keys.slice(0, keys.length - 400).forEach(k => delete history[k]);
    }
    localStorage.setItem(STORE_KEY, JSON.stringify(history));
  } catch(e) { console.warn('LocalStorage đầy:', e); }
}

// ── API: lấy tỷ giá hiện tại ────────────────────────
async function fetchLatestRate() {
  // Dùng open.er-api.com — miễn phí, CORS OK, không cần key
  const res  = await fetch('https://open.er-api.com/v6/latest/TWD');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.result !== 'success') throw new Error('API lỗi');
  const vnd = json.rates?.VND;
  if (!vnd) throw new Error('Không có VND trong response');
  return { rate: vnd, date: today() };
}

// ── LẤY + MERGE LỊCH SỬ ────────────────────────────
async function getHistory(days) {
  const history = loadHistory();
  let changed   = false;

  // Luôn cập nhật ngày hôm nay
  try {
    const { rate, date } = await fetchLatestRate();
    if (!history[date] || Math.abs(history[date] - rate) > 0.01) {
      history[date] = rate;
      changed = true;
    }
    if (changed) saveHistory(history);
  } catch (err) {
    console.error('Không lấy được rate mới nhất:', err);
  }

  // Lọc theo kỳ đã chọn
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0, 10);

  const points = Object.entries(history)
    .filter(([d]) => d >= cutoffStr)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, rate]) => ({ date, rate }));

  return points;
}

// ── UI ──────────────────────────────────────────────
let chart = null;

function setStatus(msg) {
  const el = document.getElementById('status');
  const cc = document.getElementById('chartContainer');
  if (msg) {
    el.textContent = msg;
    el.classList.remove('status-hidden');
    cc.classList.add('status-hidden');
  } else {
    el.classList.add('status-hidden');
    cc.classList.remove('status-hidden');
  }
}

function updateHeader(points) {
  if (!points.length) return;
  const rates  = points.map(p => p.rate);
  const latest = rates[rates.length - 1];
  const first  = rates[0];
  const high   = Math.max(...rates);
  const low    = Math.min(...rates);
  const avg    = rates.reduce((a, b) => a + b, 0) / rates.length;
  const pct    = ((latest - first) / first * 100).toFixed(2);
  const isUp   = latest >= first;

  document.getElementById('rateNow').childNodes[0].textContent = fmt(latest);
  document.getElementById('sHigh').textContent   = fmt(high);
  document.getElementById('sLow').textContent    = fmt(low);
  document.getElementById('sAvg').textContent    = fmt(avg);
  document.getElementById('s1k').textContent     = fmt(latest * 1000) + ' ₫';
  document.getElementById('footerRate').textContent = `1 TWD = ${fmt(latest)} VND`;

  const chg = document.getElementById('sChange');
  chg.textContent = (isUp ? '+' : '') + pct + '%';
  chg.style.color = isUp ? 'var(--up)' : pct == 0 ? 'var(--muted)' : 'var(--down)';

  const badge = document.getElementById('deltaBadge');
  badge.textContent = (isUp ? '▲ +' : '▼ ') + pct + '%';
  badge.className = 'delta-badge ' + (isUp ? 'up' : pct == 0 ? 'flat' : 'down');

  const now = new Date();
  document.getElementById('updateTime').textContent =
    now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' ' +
    now.toLocaleDateString('vi-VN');

  document.getElementById('dataInfo').textContent =
    `${points.length} điểm dữ liệu · ${points[0].date} → ${points[points.length-1].date}`;
}

function drawChart(points) {
  const avg   = points.reduce((s, p) => s + p.rate, 0) / points.length;
  const rates = points.map(p => p.rate);
  const labels = points.map(p => {
    const [, m, d] = p.date.split('-');
    return `${d}/${m}`;
  });

  const ctx = document.getElementById('rateChart').getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 0, 300);
  grad.addColorStop(0, 'rgba(0,201,167,0.22)');
  grad.addColorStop(1, 'rgba(0,201,167,0.00)');

  const data = {
    labels,
    datasets: [
      {
        label: 'TWD/VND',
        data: rates,
        borderColor: '#00c9a7',
        borderWidth: 2.5,
        pointRadius: points.length > 60 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: '#00c9a7',
        fill: true,
        backgroundColor: grad,
        tension: 0.35,
      },
      {
        label: 'Trung bình',
        data: points.map(() => avg),
        borderColor: '#f59e0b',
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        fill: false,
      }
    ]
  };

  const options = {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1e2d40',
        titleColor: '#94a3b8',
        bodyColor: '#e2e8f0',
        borderColor: '#334155',
        borderWidth: 1,
        padding: 10,
        callbacks: {
          label: ctx => ctx.datasetIndex === 0
            ? `  ${fmt(ctx.parsed.y)} VND`
            : `  TB: ${fmt(ctx.parsed.y)} VND`
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(30,45,64,0.9)' },
        ticks: { color: '#475569', font: { family: 'IBM Plex Mono', size: 10 }, maxTicksLimit: 10 }
      },
      y: {
        position: 'right',
        grid: { color: 'rgba(30,45,64,0.9)' },
        ticks: { color: '#475569', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => fmt(v) }
      }
    }
  };

  if (chart) {
    chart.data    = data;
    chart.options = options;
    chart.update();
  } else {
    chart = new Chart(ctx, { type: 'line', data, options });
  }
}

// ── MAIN LOAD ───────────────────────────────────────
async function load(days) {
  setStatus('⏳ Đang tải dữ liệu...');
  try {
    const points = await getHistory(days);

    if (!points.length) {
      setStatus('❌ Chưa có dữ liệu. Kiểm tra kết nối mạng rồi tải lại trang.');
      return;
    }

    updateHeader(points);
    drawChart(points);
    setStatus(null);

    if (points.length < 5) {
      showToast(`ℹ️ Mới có ${points.length} ngày dữ liệu. Biểu đồ sẽ đầy dần theo thời gian.`);
    }
  } catch (err) {
    setStatus('❌ Không tải được dữ liệu. Kiểm tra mạng rồi thử lại.');
    console.error(err);
  }
}

// ── RANGE BUTTONS ───────────────────────────────────
let currentDays = 30;
document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = parseInt(btn.dataset.days);
    load(currentDays);
  });
});

// ── KHỞI ĐỘNG ───────────────────────────────────────
load(currentDays);

// Tự reload mỗi 1 giờ
setInterval(() => {
  showToast('🔄 Đang cập nhật tỷ giá...');
  load(currentDays);
}, 60 * 60 * 1000);
</script>
</body>
</html>
