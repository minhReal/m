<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JJS Skill Generator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #fff; font-family: monospace; max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

h1 { font-size: 1.4rem; font-weight: bold; border-bottom: 2px solid #fff; padding-bottom: 8px; margin-bottom: 20px; }

label { display: block; font-size: .8rem; font-weight: bold; margin-bottom: 4px; }

textarea {
  width: 100%; border: 1px solid #fff; padding: 8px; font-family: monospace;
  font-size: .9rem; resize: vertical; min-height: 70px; outline: none;
  background: #000; color: #fff;
}
textarea::placeholder { color: #555; }

select {
  border: 1px solid #fff; padding: 6px 8px; font-family: monospace;
  font-size: .85rem; background: #000; color: #fff; outline: none; cursor: pointer;
}

.row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
.row .sel-group { display: flex; flex-direction: column; gap: 4px; }
.row .sel-group label { font-size: .75rem; }

button {
  background: #fff; color: #000; border: none; padding: 10px 20px;
  font-family: monospace; font-size: .9rem; cursor: pointer; margin-top: 12px; width: 100%; font-weight: bold;
}
button:hover { background: #ccc; }
button:disabled { background: #444; color: #888; cursor: not-allowed; }

#loading { display: none; padding: 16px 0; font-size: .85rem; color: #888; }

#error { display: none; border: 1px solid #fff; padding: 10px; margin-top: 12px; font-size: .82rem; background: #111; }

/* Result card */
#result { display: none; margin-top: 20px; border: 2px solid #fff; }

.card-header { padding: 14px 16px; border-bottom: 2px solid #fff; background: #fff; color: #000; }
.card-header .rarity { font-size: .7rem; letter-spacing: 2px; opacity: .6; margin-bottom: 4px; }
.card-header .name { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }
.card-header .sub { font-size: .75rem; opacity: .6; margin-top: 4px; }

.stats { display: grid; grid-template-columns: 1fr 1fr; }
.stat { padding: 10px 14px; border-right: 1px solid #333; border-bottom: 1px solid #333; }
.stat:nth-child(even) { border-right: none; }
.stat-label { font-size: .65rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 2px; }
.stat-value { font-size: 1rem; font-weight: bold; }
.stat-combo { grid-column: 1 / -1; border-right: none; }

.card-section { padding: 12px 14px; border-bottom: 1px solid #222; font-size: .83rem; line-height: 1.6; color: #ccc; }
.card-section:last-child { border-bottom: none; }

.effects { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; border-bottom: 1px solid #222; }
.tag { border: 1px solid #fff; padding: 2px 8px; font-size: .72rem; }

.b64-section { padding: 10px 14px; }
.b64-label { font-size: .7rem; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
.b64-box { font-size: .7rem; word-break: break-all; line-height: 1.5; color: #666; max-height: 60px; overflow-y: auto; background: #111; padding: 6px 8px; }
.copy-btn { background: none; border: 1px solid #fff; color: #fff; padding: 2px 8px; font-size: .7rem; width: auto; margin: 0; cursor: pointer; font-family: monospace; }
.copy-btn:hover { background: #fff; color: #000; }

/* History */
.history-title { font-size: .75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 28px 0 8px; color: #888; }
.hist-item { border: 1px solid #333; padding: 8px 12px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: .83rem; }
.hist-item:hover { border-color: #fff; }
.hist-name { font-weight: bold; }
.hist-meta { font-size: .72rem; color: #666; margin-top: 2px; }
.del-btn { background: none; border: none; color: #555; cursor: pointer; font-size: .85rem; width: auto; margin: 0; padding: 2px 6px; }
.del-btn:hover { color: #fff; background: none; }
</style>
</head>
<body>

<h1>JJS Skill Generator</h1>

<label for="prompt">Mô tả skill</label>
<textarea id="prompt" placeholder="VD: Tạo skill Lapse Blue kéo kẻ địch lại, damage 300, cooldown 8s..."></textarea>

<div class="row">
  <div class="sel-group">
    <label>Technique</label>
    <select id="technique">
      <option value="auto">Auto</option>
      <option>Lapse Blue</option>
      <option>Reversal Red</option>
      <option>Hollow Purple</option>
      <option>Domain Expansion</option>
      <option>Black Flash</option>
      <option>Divergent Fist</option>
      <option>Cursed Tool</option>
      <option>Innate Technique</option>
      <option>Simple Domain</option>
      <option>Blood Manipulation</option>
      <option>Ten Shadows</option>
      <option>Projection Sorcery</option>
    </select>
  </div>
  <div class="sel-group">
    <label>Type</label>
    <select id="type">
      <option value="auto">Auto</option>
      <option>Melee</option>
      <option>Ranged</option>
      <option>AoE</option>
      <option>Buff</option>
      <option>Summon</option>
      <option>Barrier</option>
    </select>
  </div>
  <div class="sel-group">
    <label>Rarity</label>
    <select id="rarity">
      <option value="auto">Auto</option>
      <option>Common</option>
      <option>Uncommon</option>
      <option>Rare</option>
      <option>Epic</option>
      <option>Legendary</option>
      <option>Mythic</option>
    </select>
  </div>
</div>

<button id="genBtn" onclick="generate()">GENERATE SKILL</button>
<div id="error"></div>
<div id="loading">Generating...</div>
<div id="result"></div>

<div id="histSection" style="display:none">
  <div class="history-title">History</div>
  <div id="histList"></div>
</div>

<script>
const KEY = "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";
const URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL = "llama-3.3-70b-versatile";

let history = [];
try { history = JSON.parse(localStorage.getItem("jjs_h") || "[]"); } catch(e) {}
renderHistory();

async function generate() {
  const prompt = document.getElementById("prompt").value.trim();
  if (!prompt) { showError("Nhập mô tả skill!"); return; }

  const technique = document.getElementById("technique").value;
  const type = document.getElementById("type").value;
  const rarity = document.getElementById("rarity").value;
  const extras = [
    technique !== "auto" ? "Technique: " + technique : "",
    type !== "auto" ? "Type: " + type : "",
    rarity !== "auto" ? "Rarity: " + rarity : ""
  ].filter(Boolean).join(", ");

  setLoading(true); hideError();

  const sys = `You are a Jujutsu Shenanigans (Roblox) skill designer. Return ONLY valid JSON, no markdown.
{
  "skillName": "string",
  "technique": "string",
  "type": "Melee|Ranged|AoE|Buff|Summon|Barrier",
  "rarity": "Common|Uncommon|Rare|Epic|Legendary|Mythic",
  "damage": number,
  "cooldown": number,
  "cursedEnergyCost": number,
  "range": number,
  "description": "2 sentences",
  "effects": ["array"],
  "animation": "string",
  "combo": "string or empty",
  "lore": "string"
}`;

  try {
    const res = await fetch(URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + KEY },
      body: JSON.stringify({
        model: MODEL, temperature: 0.85, max_tokens: 800,
        messages: [
          { role: "system", content: sys },
          { role: "user", content: prompt + (extras ? "\n[" + extras + "]" : "") }
        ]
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || "HTTP " + res.status);
    }

    const data = await res.json();
    let text = data.choices[0].message.content.trim().replace(/```json|```/g, "").trim();
    let skill;
    try { skill = JSON.parse(text); }
    catch { const m = text.match(/\{[\s\S]*\}/); skill = m ? JSON.parse(m[0]) : null; }
    if (!skill) throw new Error("Invalid response, try again.");

    renderSkill(skill);
    addHistory(skill);
  } catch(e) {
    showError("Error: " + e.message);
  } finally {
    setLoading(false);
  }
}

function renderSkill(s) {
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify({
    v:1,n:s.skillName,tech:s.technique,t:s.type,r:s.rarity,
    dmg:s.damage,cd:s.cooldown,ce:s.cursedEnergyCost,rng:s.range,
    fx:s.effects||[],cmb:s.combo||""
  }))));
  const tags = (s.effects||[]).map(e => `<span class="tag">${x(e)}</span>`).join("");

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
<div class="card-header">
  <div class="rarity">${x(s.rarity||"")}</div>
  <div class="name">${x(s.skillName||"Unnamed")}</div>
  <div class="sub">${x(s.type||"")} · ${x(s.technique||"")}</div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">Damage</div><div class="stat-value">${s.damage??"-"}</div></div>
  <div class="stat"><div class="stat-label">Cooldown</div><div class="stat-value">${s.cooldown??"-"}s</div></div>
  <div class="stat"><div class="stat-label">CE Cost</div><div class="stat-value">${s.cursedEnergyCost??"-"}</div></div>
  <div class="stat"><div class="stat-label">Range</div><div class="stat-value">${s.range??"-"} studs</div></div>
  ${s.combo ? `<div class="stat stat-combo"><div class="stat-label">Combo</div><div class="stat-value">${x(s.combo)}</div></div>` : ""}
</div>
${tags ? `<div class="effects">${tags}</div>` : ""}
${s.description ? `<div class="card-section">${x(s.description)}</div>` : ""}
${s.animation ? `<div class="card-section"><b style="color:#fff">Animation:</b> ${x(s.animation)}</div>` : ""}
${s.lore ? `<div class="card-section" style="color:#555;font-style:italic">${x(s.lore)}</div>` : ""}
<div class="b64-section">
  <div class="b64-label"><span>Base64 Block</span><button class="copy-btn" id="cpBtn">Copy</button></div>
  <div class="b64-box">${b64}</div>
</div>`;

  document.getElementById("cpBtn").onclick = () => {
    navigator.clipboard.writeText(b64).then(() => {
      document.getElementById("cpBtn").textContent = "Copied!";
      setTimeout(() => { document.getElementById("cpBtn").textContent = "Copy"; }, 2000);
    }).catch(() => prompt("Copy:", b64));
  };
}

function x(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function addHistory(skill) {
  history.unshift({ skill, time: new Date().toLocaleString("vi-VN") });
  if (history.length > 10) history.pop();
  try { localStorage.setItem("jjs_h", JSON.stringify(history)); } catch(e) {}
  renderHistory();
}

function renderHistory() {
  const sec = document.getElementById("histSection");
  const list = document.getElementById("histList");
  if (!history.length) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  list.innerHTML = history.map((h, i) => `
    <div class="hist-item" onclick="showHist(${i})">
      <div><div class="hist-name">${x(h.skill.skillName||"?")}</div>
      <div class="hist-meta">${x(h.skill.rarity||"?")} · ${x(h.skill.type||"?")} · ${h.time}</div></div>
      <button class="del-btn" onclick="delHist(event,${i})">✕</button>
    </div>`).join("");
}

function showHist(i) { renderSkill(history[i].skill); window.scrollTo({top:0,behavior:"smooth"}); }
function delHist(e, i) {
  e.stopPropagation();
  history.splice(i, 1);
  try { localStorage.setItem("jjs_h", JSON.stringify(history)); } catch(e) {}
  renderHistory();
}

function setLoading(on) {
  document.getElementById("loading").style.display = on ? "block" : "none";
  document.getElementById("genBtn").disabled = on;
  if (on) document.getElementById("result").style.display = "none";
}
function showError(msg) { const e = document.getElementById("error"); e.style.display = "block"; e.textContent = msg; }
function hideError() { document.getElementById("error").style.display = "none"; }
</script>
</body>
</html>
